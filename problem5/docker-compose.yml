version: '3.9'
services:
  app:
    build: .
    ports:
      - '${APP_PORT:-3333}:3000'
    environment:
      - MONGO_URI=mongodb://mongo:27017/problem5
    depends_on:
      - mongo
  mongo:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data:
